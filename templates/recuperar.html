<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="login-logo">
            <h2>Recuperación</h2>
            <p>Ingresa tu correo para recibir un enlace seguro</p>
            
            {% if error %}
            <div class="alert-error">
                <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="alert-error" style="background: #dcfce7; color: #16a34a;">
                <i class="fa-solid fa-check-circle"></i> {{ success }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('recuperar') }}" method="POST">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="correo" placeholder="Correo electrónico registrado" required>
                </div>
                
                <button type="submit" class="btn-login">Enviar Enlace</button>
            </form>
            
            <div class="login-footer">
                <p><a href="{{ url_for('login') }}">Volver al Inicio de Sesión</a></p>
            </div>
        </div>
    </div>
</body>
</html>
