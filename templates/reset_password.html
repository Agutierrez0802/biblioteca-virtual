<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="login-logo">
            <h2>Nueva Contraseña</h2>
            <p>Ingresa tu nueva contraseña para acceder</p>
            
            {% if error %}
            <div class="alert-error">
                <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('reset_password', token=token) }}" method="POST">
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Nueva Contraseña" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="confirm_password" placeholder="Confirmar Contraseña" required>
                </div>
                
                <button type="submit" class="btn-login">Restablecer y Entrar</button>
            </form>
            
            <div class="login-footer">
                <p><a href="{{ url_for('login') }}">Volver al Inicio</a></p>
            </div>
        </div>
    </div>
</body>
</html>
